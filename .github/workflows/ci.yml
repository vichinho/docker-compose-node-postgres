name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build y verificación de servicios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Crear archivo .env desde secrets
        run: |
          echo "POSTGRES_USER=admin" >> .env
          echo "POSTGRES_PASSWORD=secret" >> .env
          echo "POSTGRES_DB=appdb" >> .env
          echo "APP_PORT=3000" >> .env

      - name: Levantar servicios con Docker Compose
        run: docker compose up -d --build

      - name: Esperar a que la app esté lista
        run: |
          echo "Esperando que la app responda..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000; then
              echo "✅ App respondiendo correctamente"
              exit 0
            fi
            echo "Intento $i/15 - esperando 3 segundos..."
            sleep 3
          done
          echo "❌ La app no respondió a tiempo"
          docker compose logs
          exit 1

      - name: Ver logs de los contenedores
        if: failure()
        run: docker compose logs

      - name: Detener servicios
        if: always()
        run: docker compose down -v
